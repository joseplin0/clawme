name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec nuxi typecheck

      - name: Build
        id: build
        shell: bash
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee build.log
        env:
          NUXT_SESSION_PASSWORD: test-session-password-with-at-least-32-characters
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clawme

      - name: Summarize build warnings
        if: always()
        shell: bash
        run: |
          node <<'EOF'
          const fs = require("node:fs");

          const logPath = "build.log";
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const outputPath = "build-warning-comment.md";
          const marker = "<!-- build-warning-summary -->";

          const log = fs.existsSync(logPath)
            ? fs.readFileSync(logPath, "utf8")
            : "";

          const sourcemapMatches = [
            ...log.matchAll(/WARN\s+\[(.*?)\]\s+Sourcemap is likely to be incorrect/g),
          ];
          const sourcemapCounts = new Map();
          for (const match of sourcemapMatches) {
            const plugin = match[1];
            sourcemapCounts.set(plugin, (sourcemapCounts.get(plugin) || 0) + 1);
          }

          const hasChunkWarning = /Some chunks are larger than 500 kB after minification\./.test(log);
          const warningLines = [];

          if (sourcemapCounts.size > 0) {
            warningLines.push("### Sourcemap warnings");
            for (const [plugin, count] of sourcemapCounts.entries()) {
              warningLines.push(`- \`${plugin}\`: ${count} 次`);
            }
          }

          if (hasChunkWarning) {
            if (warningLines.length > 0) {
              warningLines.push("");
            }
            warningLines.push("### Chunk size warning");
            warningLines.push("- 存在打包后大于 `500 kB` 的 chunk，建议后续评估拆包。");
          }

          const summary = [];
          summary.push("## Build warning summary");
          summary.push("");
          if (warningLines.length === 0) {
            summary.push("未检测到 build warning。");
          } else {
            summary.push(...warningLines);
          }
          summary.push("");
          summary.push("完整构建日志请查看当前 workflow 的 `Build` step。");
          fs.appendFileSync(summaryPath, `${summary.join("\n")}\n`);

          const prComment = [];
          prComment.push(marker);
          prComment.push("## Build Warnings");
          prComment.push("");
          if (warningLines.length === 0) {
            prComment.push("本次 `pnpm build` 未检测到 warning。");
          } else {
            prComment.push("本次 `pnpm build` 已通过，但检测到以下 warning：");
            prComment.push("");
            prComment.push(...warningLines);
          }
          prComment.push("");
          prComment.push("完整构建日志请查看当前 workflow 的 `Build` step。");
          fs.writeFileSync(outputPath, `${prComment.join("\n")}\n`);
          EOF

      - name: Upload build log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

      - name: Comment build warnings on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs')
            const body = fs.readFileSync('build-warning-comment.md', 'utf8')
            const marker = '<!-- build-warning-summary -->'
            const { owner, repo } = context.repo
            const issue_number = context.issue.number

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker),
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
              return
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            })

      - name: Unit tests
        run: pnpm test:unit
        env:
          NUXT_SESSION_PASSWORD: test-session-password-with-at-least-32-characters
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clawme

      - name: End-to-end tests
        run: pnpm test:e2e
        env:
          NUXT_E2E_SKIP_BUILD: "true"
          NUXT_SESSION_PASSWORD: test-session-password-with-at-least-32-characters
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clawme
