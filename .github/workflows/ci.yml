name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec nuxi typecheck

      - name: Unit tests
        run: pnpm test:unit
        env:
          NUXT_SESSION_PASSWORD: test-session-password-with-at-least-32-characters
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clawme

      - name: End-to-end tests
        run: pnpm test:e2e
        env:
          NUXT_SESSION_PASSWORD: test-session-password-with-at-least-32-characters
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clawme
